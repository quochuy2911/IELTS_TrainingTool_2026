# Copy this file to .streamlit/secrets.toml for local testing.
# For Streamlit Community Cloud, paste the same content into App settings > Secrets.
# Do NOT commit your real secrets.toml to GitHub.

[storage]
google_sheet_id = "paste_your_google_sheet_id_here"
google_drive_folder_id = "paste_your_google_drive_folder_id_here"

[gcp_service_account]
type = "service_account"
project_id = "your_project_id"
private_key_id = "your_private_key_id"
private_key = "-----BEGIN PRIVATE KEY-----\nYOUR_PRIVATE_KEY\n-----END PRIVATE KEY-----\n"
client_email = "your-service-account@your-project.iam.gserviceaccount.com"
client_id = "your_client_id"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "your_cert_url"
universe_domain = "googleapis.com"
